<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <title>英文學習 App v3 真考試版</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --bg:#eef5ff;--card:#fff;--text:#101828;--muted:#667085;--blue:#2563eb;
      --blue2:#1d4ed8;--line:#dbe7ff;--green:#dcfce7;--greenText:#166534;
      --red:#fee2e2;--redText:#991b1b;--yellow:#fef9c3;--yellowText:#854d0e;
      --shadow:0 18px 40px rgba(30,64,175,.14);--radius:26px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,#eef6ff,#f8fbff);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",sans-serif}
    body{min-height:100vh;padding:env(safe-area-inset-top) 14px calc(28px + env(safe-area-inset-bottom))}
    .app{max-width:680px;margin:0 auto}
    .top{padding:18px 4px 10px}
    .title{display:flex;align-items:center;gap:10px;font-size:24px;font-weight:900;letter-spacing:.5px}
    .badge{font-size:13px;font-weight:900;color:#fff;background:var(--blue);border-radius:999px;padding:5px 10px}
    .sub{color:var(--muted);font-size:15px;margin-top:4px;line-height:1.5}
    .tabs{display:flex;gap:10px;overflow:auto;padding:10px 0 16px;position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#eef6ff 75%,rgba(238,246,255,0))}
    .tab{border:0;white-space:nowrap;border-radius:999px;padding:13px 18px;background:#fff;color:#667085;font-size:17px;font-weight:900;box-shadow:0 6px 18px rgba(16,24,40,.06)}
    .tab.active{background:var(--blue);color:#fff}
    .card{background:rgba(255,255,255,.96);border:1px solid rgba(219,231,255,.95);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px}
    .sectionTitle{font-size:28px;font-weight:950;display:flex;gap:10px;align-items:center;margin:0 0 6px}
    .desc{font-size:18px;color:var(--muted);line-height:1.5;margin:0 0 18px}
    .bigword{font-size:56px;line-height:1.05;text-align:center;font-weight:950;margin:22px 0 10px;letter-spacing:-1px}
    .zh{font-size:25px;font-weight:900;text-align:center;margin:8px 0 14px}
    .emoji{font-size:76px;text-align:center;line-height:1.1;margin:16px 0 10px}
    .hint{font-size:17px;text-align:center;color:var(--muted);line-height:1.45;margin:0 0 16px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .btn{width:100%;border:0;border-radius:22px;background:var(--blue);color:#fff;padding:18px 18px;font-size:22px;font-weight:950;box-shadow:0 10px 24px rgba(37,99,235,.25)}
    .btn:active{transform:translateY(1px)}
    .btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:0 8px 20px rgba(16,24,40,.05)}
    .btn.small{width:auto;font-size:16px;padding:11px 14px;border-radius:16px}
    .btn.danger{background:#ef4444}
    .options{display:grid;gap:14px;margin-top:18px}
    .option{width:100%;text-align:left;border:1.5px solid var(--line);border-radius:22px;background:#fff;padding:18px 20px;font-size:22px;font-weight:950;color:var(--text);box-shadow:0 8px 18px rgba(16,24,40,.04)}
    .option.correct{background:var(--green);border-color:#86efac;color:var(--greenText)}
    .option.wrong{background:var(--red);border-color:#fca5a5;color:var(--redText)}
    .pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-weight:900;padding:8px 11px;font-size:14px;margin:4px 4px 4px 0}
    .notice{border-radius:20px;background:var(--yellow);color:var(--yellowText);padding:14px 15px;font-size:16px;font-weight:800;line-height:1.45;margin:12px 0}
    .result{font-size:23px;font-weight:950;text-align:center;margin:16px 0}
    .answerBox{display:none;background:#f8fbff;border:1px dashed #bad3ff;border-radius:22px;padding:16px;margin-top:16px}
    .answerBox.show{display:block}
    .answerGrid{display:grid;grid-template-columns:80px 1fr;gap:12px;align-items:center}
    .answerEmoji{font-size:54px;text-align:center}
    .example{font-size:17px;line-height:1.55;color:#344054}
    .mini{font-size:14px;color:var(--muted);line-height:1.5}
    .progress{height:12px;background:#e5eefc;border-radius:999px;overflow:hidden;margin:14px 0}
    .bar{height:100%;background:linear-gradient(90deg,#2563eb,#60a5fa);width:0%}
    .list{display:grid;gap:10px}
    .wordItem{border:1px solid var(--line);background:#fff;border-radius:20px;padding:16px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center}
    .wordItem .e{font-size:22px;font-weight:950}
    .wordItem .m{font-size:15px;color:var(--muted);margin-top:3px}
    input,select,textarea{width:100%;border:1.5px solid var(--line);border-radius:18px;padding:15px;font-size:18px;background:#fff;color:var(--text)}
    label{font-size:15px;font-weight:900;color:#475467;margin:13px 0 6px;display:block}
    .hidden{display:none!important}
    .footer{text-align:center;color:#667085;font-size:14px;line-height:1.6;margin:24px 0}
    .modeBox{display:grid;gap:10px;margin:12px 0 2px}
    .mode{border:1.5px solid var(--line);background:#fff;border-radius:20px;padding:15px;text-align:left}
    .mode b{font-size:18px}
    .mode span{display:block;color:var(--muted);font-size:14px;line-height:1.45;margin-top:3px}
    .mode.active{border-color:#2563eb;background:#eff6ff}
    @media (max-width:380px){
      .bigword{font-size:46px}
      .sectionTitle{font-size:24px}
      .option,.btn{font-size:19px}
      .tab{font-size:16px;padding:12px 15px}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="title">📘 英文學習 App <span class="badge">v3 真考試版</span></div>
    <div class="sub">測驗不再給圖片答案。先動腦答題，答完才看圖像記憶與例句。</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="cards">單字卡</button>
    <button class="tab" data-tab="quiz">測驗</button>
    <button class="tab" data-tab="wrong">錯題</button>
    <button class="tab" data-tab="phrases">句型</button>
    <button class="tab" data-tab="add">新增</button>
  </div>

  <section id="cards" class="page">
    <div class="card">
      <h1 class="sectionTitle">🧠 圖像單字卡</h1>
      <p class="desc">這裡可以看圖記憶；真正測驗頁會把圖片藏起來。</p>
      <div class="progress"><div class="bar" id="cardBar"></div></div>
      <div id="cardEmoji" class="emoji"></div>
      <div id="cardWord" class="bigword"></div>
      <div id="cardPhonetic" class="hint"></div>
      <div id="cardZh" class="zh"></div>
      <div id="cardMemory" class="hint"></div>
      <div class="row">
        <button class="btn small secondary" id="speakCard">🔊 發音</button>
        <button class="btn small secondary" id="favCard">⭐ 收藏</button>
        <button class="btn small secondary" id="knownCard">✅ 已會</button>
      </div>
      <button class="btn" id="nextCard" style="margin-top:14px">下一個單字</button>
    </div>
  </section>

  <section id="quiz" class="page hidden">
    <div class="card">
      <h1 class="sectionTitle">🎯 真正測驗</h1>
      <p class="desc">新版規則：題目中不顯示圖像提示，答完才顯示圖片幫你加深印象。</p>
      <div class="notice" id="quizNotice">目前是混合題型。圖片只會在答完後出現。</div>

      <div class="modeBox">
        <button class="mode active" data-mode="mixed"><b>混合測驗</b><span>英文選中文、中文選英文、聽力隨機出題。</span></button>
        <button class="mode" data-mode="en2zh"><b>看英文選中文</b><span>不給圖片，靠單字本身判斷。</span></button>
        <button class="mode" data-mode="zh2en"><b>看中文選英文</b><span>訓練主動回想英文。</span></button>
        <button class="mode" data-mode="listening"><b>聽發音選中文</b><span>先聽聲音，不看英文。</span></button>
      </div>

      <div style="margin-top:18px">
        <span class="pill" id="quizType">題型</span>
        <span class="pill" id="scorePill">0 / 0</span>
      </div>

      <div id="questionArea">
        <div id="questionMain" class="bigword"></div>
        <div id="questionSub" class="hint"></div>
      </div>

      <div class="options" id="options"></div>
      <div id="result" class="result"></div>

      <div id="answerBox" class="answerBox">
        <div class="answerGrid">
          <div id="answerEmoji" class="answerEmoji"></div>
          <div>
            <div id="answerWord" style="font-size:26px;font-weight:950"></div>
            <div id="answerMeaning" style="font-size:18px;font-weight:900;color:#475467;margin-top:4px"></div>
            <div id="answerMemory" class="mini" style="margin-top:8px"></div>
          </div>
        </div>
        <div id="answerExample" class="example" style="margin-top:12px"></div>
      </div>

      <button class="btn" id="nextQuiz" style="margin-top:16px">下一題</button>
    </div>
  </section>

  <section id="wrong" class="page hidden">
    <div class="card">
      <h1 class="sectionTitle">🧯 錯題複習</h1>
      <p class="desc">答錯的單字會出現在這裡。多複習幾次，比一直背新單字有效。</p>
      <div id="wrongList" class="list"></div>
      <button class="btn secondary" id="clearWrong" style="margin-top:14px">清空錯題</button>
    </div>
  </section>

  <section id="phrases" class="page hidden">
    <div class="card">
      <h1 class="sectionTitle">💬 生活句型</h1>
      <p class="desc">先把常用句講順，再慢慢補文法。</p>
      <div id="phraseList" class="list"></div>
    </div>
  </section>

  <section id="add" class="page hidden">
    <div class="card">
      <h1 class="sectionTitle">➕ 新增單字</h1>
      <p class="desc">自己遇到的單字可以加進來。圖片記憶可用 emoji。</p>
      <label>英文</label><input id="newWord" placeholder="coffee">
      <label>中文意思</label><input id="newMeaning" placeholder="咖啡">
      <label>emoji 圖像記憶</label><input id="newEmoji" placeholder="☕">
      <label>記憶提示</label><input id="newMemory" placeholder="看到 ☕ 想到 coffee">
      <label>例句</label><textarea id="newExample" placeholder="I need a cup of coffee."></textarea>
      <button class="btn" id="addWord" style="margin-top:16px">加入單字</button>
    </div>
  </section>

  <div class="footer">
    版本：v3.0 真考試版<br>
    建議：每天 10 個單字 + 5 句生活句型。先求敢說，再求文法完美。
  </div>
</div>

<script>
const VERSION = "v3.0-real-quiz";
const baseWords = [
  ["hello","你好","👋","看到打招呼的手，想到 hello。","Hello, nice to meet you.","/həˈloʊ/","生活"],
  ["thanks","謝謝","🙏","有人幫你時說 thanks。","Thanks for your help.","/θæŋks/","生活"],
  ["sorry","抱歉","🙇","做錯事時說 sorry。","Sorry, I am late.","/ˈsɑːri/","生活"],
  ["please","請","🙏","拜託別人時加 please。","Please wait a minute.","/pliːz/","生活"],
  ["water","水","💧","看到水滴想到 water。","I want some water.","/ˈwɔːtər/","飲食"],
  ["coffee","咖啡","☕","看到咖啡杯想到 coffee。","I drink coffee every morning.","/ˈkɔːfi/","飲食"],
  ["breakfast","早餐","🍳","早上吃蛋，想到 breakfast。","I eat breakfast at seven.","/ˈbrekfəst/","飲食"],
  ["lunch","午餐","🍱","中午便當想到 lunch。","What do you want for lunch?","/lʌntʃ/","飲食"],
  ["dinner","晚餐","🍽️","晚上吃 dinner。","Dinner is ready.","/ˈdɪnər/","飲食"],
  ["menu","菜單","📋","點餐先看 menu。","Can I see the menu?","/ˈmenjuː/","飲食"],
  ["price","價格","💰","買東西先看 price。","What is the price?","/praɪs/","購物"],
  ["cheap","便宜的","🏷️","特價標籤想到 cheap。","This shirt is cheap.","/tʃiːp/","購物"],
  ["expensive","昂貴的","💸","錢飛走，想到 expensive。","This phone is expensive.","/ɪkˈspensɪv/","購物"],
  ["store","商店","🏪","便利商店就是 store。","The store is near my house.","/stɔːr/","購物"],
  ["receipt","收據","🧾","買完拿 receipt。","Can I have a receipt?","/rɪˈsiːt/","購物"],
  ["bus","公車","🚌","搭公車想到 bus。","I take the bus to work.","/bʌs/","交通"],
  ["train","火車","🚆","火車就是 train。","The train is coming.","/treɪn/","交通"],
  ["taxi","計程車","🚕","黃色車想到 taxi。","Let's take a taxi.","/ˈtæksi/","交通"],
  ["station","車站","🚉","搭車去 station。","Where is the train station?","/ˈsteɪʃən/","交通"],
  ["ticket","票","🎫","搭車看電影都要 ticket。","I need one ticket.","/ˈtɪkɪt/","交通"],
  ["today","今天","📅","今天就是 today。","Today is Monday.","/təˈdeɪ/","時間"],
  ["tomorrow","明天","➡️📅","下一天是 tomorrow。","See you tomorrow.","/təˈmɑːroʊ/","時間"],
  ["yesterday","昨天","⬅️📅","前一天是 yesterday。","I was busy yesterday.","/ˈjestərdeɪ/","時間"],
  ["morning","早上","🌅","太陽升起是 morning。","Good morning.","/ˈmɔːrnɪŋ/","時間"],
  ["evening","傍晚；晚上","🌆","天色變暗是 evening。","I study English in the evening.","/ˈiːvnɪŋ/","時間"],
  ["happy","開心的","😊","笑臉想到 happy。","I am happy today.","/ˈhæpi/","心情"],
  ["tired","累的","😫","疲累臉想到 tired。","I am tired after work.","/ˈtaɪərd/","心情"],
  ["hungry","餓的","😋","想吃東西就是 hungry。","I am hungry.","/ˈhʌŋɡri/","心情"],
  ["busy","忙碌的","💼","工作很多就是 busy。","I am busy now.","/ˈbɪzi/","生活"],
  ["help","幫助","🆘","需要幫忙喊 help。","Can you help me?","/help/","生活"],
  ["problem","問題","❓","問號想到 problem。","We have a problem.","/ˈprɑːbləm/","生活"],
  ["phone","手機；電話","📱","手機就是 phone。","My phone is on the table.","/foʊn/","生活"],
  ["address","地址","🏠","住家位置是 address。","What is your address?","/əˈdres/","生活"],
  ["bathroom","廁所","🚻","找廁所問 bathroom。","Where is the bathroom?","/ˈbæθruːm/","生活"],
  ["doctor","醫生","👨‍⚕️","看病找 doctor。","I need to see a doctor.","/ˈdɑːktər/","生活"],
  ["medicine","藥","💊","藥丸想到 medicine。","Take this medicine after meals.","/ˈmedɪsən/","生活"],
  ["weather","天氣","🌤️","太陽雲想到 weather。","How is the weather?","/ˈweðər/","生活"],
  ["umbrella","雨傘","☂️","下雨拿 umbrella。","Take an umbrella with you.","/ʌmˈbrelə/","生活"],
  ["open","打開；營業","🔓","打開鎖想到 open。","Is the store open?","/ˈoʊpən/","生活"],
  ["closed","關閉；打烊","🔒","關起來是 closed。","The shop is closed.","/kloʊzd/","生活"]
].map((x,i)=>({id:"w"+i,word:x[0],meaning:x[1],emoji:x[2],memory:x[3],example:x[4],phonetic:x[5],cat:x[6]}));

const phrases = [
  ["Could you say that again?","你可以再說一次嗎？","聽不清楚"],
  ["What does this word mean?","這個單字是什麼意思？","問意思"],
  ["I am still learning English.","我還在學英文。","自我介紹"],
  ["Let me think for a second.","讓我想一下。","爭取時間"],
  ["Can you give me an example?","你可以給我一個例子嗎？","問例子"],
  ["How much is it?","這個多少錢？","購物"],
  ["Where is the bathroom?","廁所在哪裡？","問路"],
  ["I would like this one.","我想要這個。","點餐購物"]
];

const LS = "english_app_v3_real_quiz";
let state = load();
let tab = "cards", cardIndex = 0, quizMode = "mixed", current = null, answered = false;
let score = {ok:0,total:0};

function load(){
  try{
    const saved = JSON.parse(localStorage.getItem(LS) || "{}");
    return {words: saved.words || baseWords, wrong: saved.wrong || {}, fav: saved.fav || {}, known: saved.known || {}};
  }catch(e){ return {words:baseWords,wrong:{},fav:{},known:{}}; }
}
function save(){ localStorage.setItem(LS, JSON.stringify(state)); }
function $(id){ return document.getElementById(id); }
function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }
function sample(arr,n){ return shuffle(arr).slice(0,n); }
function speak(text){
  if(!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US"; u.rate = .82;
  window.speechSynthesis.speak(u);
}

document.querySelectorAll(".tab").forEach(b=>{
  b.onclick=()=>{
    tab=b.dataset.tab;
    document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===b));
    document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
    $(tab).classList.remove("hidden");
    if(tab==="wrong") renderWrong();
    if(tab==="phrases") renderPhrases();
    if(tab==="quiz") newQuiz();
  }
});
document.querySelectorAll(".mode").forEach(b=>{
  b.onclick=()=>{
    quizMode=b.dataset.mode;
    document.querySelectorAll(".mode").forEach(x=>x.classList.toggle("active",x===b));
    newQuiz();
  }
});

function renderCard(){
  const w = state.words[cardIndex % state.words.length];
  $("cardBar").style.width = (((cardIndex%state.words.length)+1)/state.words.length*100)+"%";
  $("cardEmoji").textContent=w.emoji;
  $("cardWord").textContent=w.word;
  $("cardPhonetic").textContent=w.phonetic || "";
  $("cardZh").textContent=w.meaning;
  $("cardMemory").textContent=w.memory;
  $("favCard").textContent = state.fav[w.id] ? "⭐ 已收藏" : "⭐ 收藏";
}
$("nextCard").onclick=()=>{cardIndex++;renderCard();}
$("speakCard").onclick=()=>speak(state.words[cardIndex % state.words.length].word);
$("favCard").onclick=()=>{const w=state.words[cardIndex%state.words.length]; state.fav[w.id]=!state.fav[w.id]; save(); renderCard();}
$("knownCard").onclick=()=>{const w=state.words[cardIndex%state.words.length]; state.known[w.id]=true; save(); cardIndex++; renderCard();}

function makeOptions(correct, field){
  const wrongs = state.words.filter(w=>w.id!==correct.id);
  let opts = sample(wrongs,3).map(w=>w[field]);
  opts.push(correct[field]);
  return shuffle(opts);
}

function chooseType(){
  if(quizMode !== "mixed") return quizMode;
  return sample(["en2zh","zh2en","listening"],1)[0];
}

function newQuiz(){
  answered=false;
  $("result").textContent="";
  $("answerBox").classList.remove("show");
  const w = sample(state.words,1)[0];
  const type = chooseType();
  current = {w,type};
  const typeName = type==="en2zh" ? "看英文選中文" : type==="zh2en" ? "看中文選英文" : "聽發音選中文";
  $("quizType").textContent = typeName;
  $("scorePill").textContent = `${score.ok} / ${score.total}`;
  $("options").innerHTML="";
  if(type==="en2zh"){
    $("questionMain").textContent = w.word;
    $("questionSub").textContent = "請選出正確中文意思。圖片與記憶提示已隱藏。";
    makeOptions(w,"meaning").forEach(v=>addOption(v, v===w.meaning));
  }else if(type==="zh2en"){
    $("questionMain").textContent = w.meaning;
    $("questionSub").textContent = "請選出正確英文。不要靠圖片，練主動回想。";
    makeOptions(w,"word").forEach(v=>addOption(v, v===w.word));
  }else{
    $("questionMain").textContent = "🔊";
    $("questionSub").innerHTML = "先按發音，再選中文。<br><button class='btn small secondary' id='playListen'>播放發音</button>";
    setTimeout(()=>{ const p=$("playListen"); if(p) p.onclick=()=>speak(w.word); },0);
    makeOptions(w,"meaning").forEach(v=>addOption(v, v===w.meaning));
    setTimeout(()=>speak(w.word), 250);
  }
}

function addOption(text, isCorrect){
  const b=document.createElement("button");
  b.className="option";
  b.textContent=text;
  b.onclick=()=>answer(b,isCorrect);
  $("options").appendChild(b);
}

function answer(btn,isCorrect){
  if(answered) return;
  answered=true; score.total++;
  const {w} = current;
  document.querySelectorAll(".option").forEach(o=>{
    const ok = (current.type==="zh2en" ? o.textContent===w.word : o.textContent===w.meaning);
    if(ok) o.classList.add("correct");
  });
  if(!isCorrect){ btn.classList.add("wrong"); state.wrong[w.id]=(state.wrong[w.id]||0)+1; $("result").textContent="❌ 答錯了，再看圖加深印象"; }
  else { score.ok++; $("result").textContent="✅ 答對了！"; }
  $("scorePill").textContent = `${score.ok} / ${score.total}`;
  $("answerEmoji").textContent=w.emoji;
  $("answerWord").textContent=w.word + " " + (w.phonetic || "");
  $("answerMeaning").textContent=w.meaning;
  $("answerMemory").textContent=w.memory;
  $("answerExample").innerHTML=`<b>例句：</b>${w.example}`;
  $("answerBox").classList.add("show");
  save();
}
$("nextQuiz").onclick=newQuiz;

function renderWrong(){
  const ids=Object.keys(state.wrong).filter(id=>state.wrong[id]>0);
  const box=$("wrongList"); box.innerHTML="";
  if(ids.length===0){ box.innerHTML="<div class='notice'>目前沒有錯題。去測驗幾題看看。</div>"; return; }
  ids.sort((a,b)=>state.wrong[b]-state.wrong[a]).forEach(id=>{
    const w=state.words.find(x=>x.id===id); if(!w) return;
    const div=document.createElement("div");
    div.className="wordItem";
    div.innerHTML=`<div style="font-size:34px">${w.emoji}</div><div><div class="e">${w.word}</div><div class="m">${w.meaning}｜錯 ${state.wrong[id]} 次</div></div><button class="btn small secondary">🔊</button>`;
    div.querySelector("button").onclick=()=>speak(w.word);
    box.appendChild(div);
  });
}
$("clearWrong").onclick=()=>{state.wrong={}; save(); renderWrong();}

function renderPhrases(){
  const box=$("phraseList"); box.innerHTML="";
  phrases.forEach(p=>{
    const div=document.createElement("div");
    div.className="wordItem";
    div.innerHTML=`<div style="font-size:32px">💬</div><div><div class="e" style="font-size:19px">${p[0]}</div><div class="m">${p[1]}｜${p[2]}</div></div><button class="btn small secondary">🔊</button>`;
    div.querySelector("button").onclick=()=>speak(p[0]);
    box.appendChild(div);
  });
}

$("addWord").onclick=()=>{
  const word=$("newWord").value.trim(), meaning=$("newMeaning").value.trim();
  if(!word || !meaning){ alert("英文和中文意思要填。"); return; }
  const w={id:"custom-"+Date.now(),word,meaning,emoji:$("newEmoji").value.trim()||"🧠",memory:$("newMemory").value.trim()||"自己新增的單字。",example:$("newExample").value.trim()||`I use the word ${word}.`,phonetic:"",cat:"自訂"};
  state.words.unshift(w); save();
  ["newWord","newMeaning","newEmoji","newMemory","newExample"].forEach(id=>$(id).value="");
  alert("已加入單字。");
  cardIndex=0; renderCard();
};

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("service-worker.js").catch(()=>{}));
}
renderCard();
</script>
</body>
</html>
