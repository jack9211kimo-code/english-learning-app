<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="英文學習" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>英文學習 App｜生活對話圖片記憶版 v2</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.svg" />
  <style>
    :root{

      --primary:#2563eb;--primary2:#1d4ed8;--ok:#16a34a;--bad:#dc2626;--warn:#f59e0b;
      --shadow:0 12px 30px rgba(15,23,42,.08);--radius:22px;
    }
    *{box-sizing:border-box} html{scroll-behavior:smooth}
    body{margin:0;background:linear-gradient(180deg,#eff6ff 0,#f6f7fb 28%,#f6f7fb 100%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",Arial,sans-serif;color:var(--text);}
    button,input,select,textarea{font:inherit} button{touch-action:manipulation}
    .app{max-width:980px;margin:0 auto;min-height:100vh;padding:16px 14px 90px}
    .hero{position:sticky;top:0;z-index:20;margin:-16px -14px 12px;padding:14px 14px 12px;background:rgba(246,247,251,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(229,231,235,.75)}
    .hero-row{display:flex;gap:12px;align-items:center;justify-content:space-between;max-width:980px;margin:0 auto}
    .brand{display:flex;gap:10px;align-items:center}.logo{width:44px;height:44px;border-radius:15px;display:grid;place-items:center;background:#dbeafe;box-shadow:inset 0 0 0 1px rgba(37,99,235,.14);font-size:25px}
    h1{font-size:20px;line-height:1.15;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:3px}.pill{display:inline-flex;gap:5px;align-items:center;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 10px;font-size:12px;color:#374151;box-shadow:0 4px 12px rgba(15,23,42,.04)}
    .tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px auto 0;max-width:980px}.tab{border:0;border-radius:16px;background:#fff;padding:9px 4px;box-shadow:0 4px 14px rgba(15,23,42,.06);color:#374151;font-size:12px}.tab.active{background:var(--primary);color:#fff;font-weight:700}
    .grid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}.section-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.section-title h2{margin:0;font-size:18px}.small{font-size:12px;color:var(--muted)}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px;box-shadow:0 8px 20px rgba(15,23,42,.05)}.stat b{font-size:20px;display:block}.stat span{font-size:12px;color:var(--muted)}
    .filters{display:grid;grid-template-columns:1fr 120px 120px;gap:8px;margin-bottom:12px}.field{width:100%;border:1px solid var(--line);border-radius:16px;background:#fff;padding:12px 13px;outline:none}.field:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(37,99,235,.12)}
    .word-card{display:grid;gap:12px}.image-cue{height:150px;border-radius:24px;background:radial-gradient(circle at 30% 20%,#fff 0,#dbeafe 36%,#bfdbfe 100%);display:grid;place-items:center;font-size:76px;border:1px solid #bfdbfe}.word-line{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.word{font-size:42px;font-weight:900;letter-spacing:-.03em}.phonetic{color:var(--muted);font-size:15px}.tag-row{display:flex;flex-wrap:wrap;gap:7px}.tag{background:#f3f4f6;border:1px solid var(--line);border-radius:999px;padding:5px 9px;font-size:12px;color:#374151}.tag.blue{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.tag.green{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}.tag.orange{background:#fffbeb;color:#b45309;border-color:#fde68a}
    .meaning{font-size:22px;font-weight:800;line-height:1.35}.example{background:#f9fafb;border:1px solid var(--line);border-radius:18px;padding:13px;line-height:1.5}.example .en{font-weight:750}.example .zh{color:var(--muted);margin-top:4px}.memory{background:#fff7ed;border:1px solid #fed7aa;border-radius:18px;padding:12px;line-height:1.55;color:#7c2d12}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.btn{border:0;border-radius:16px;padding:12px 10px;background:#f3f4f6;color:#111827;font-weight:750}.btn.primary{background:var(--primary);color:#fff}.btn.ok{background:#dcfce7;color:#166534}.btn.bad{background:#fee2e2;color:#991b1b}.btn.warn{background:#fef3c7;color:#92400e}.btn:active{transform:scale(.985)}
    .list{display:grid;gap:8px;max-height:500px;overflow:auto;padding-right:3px}.word-item{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:#fff;border-radius:16px;padding:10px;text-align:left}.word-item.active{border-color:#93c5fd;background:#eff6ff}.item-emoji{width:42px;height:42px;border-radius:14px;background:#f3f4f6;display:grid;place-items:center;font-size:25px}.item-main{flex:1;min-width:0}.item-main b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.item-main span{display:block;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.star{border:0;background:transparent;font-size:22px;padding:4px}
    .quiz-box{text-align:center}.quiz-emoji{width:118px;height:118px;margin:6px auto 12px;border-radius:34px;background:#eff6ff;display:grid;place-items:center;font-size:68px;border:1px solid #bfdbfe}.quiz-word{font-size:34px;font-weight:900;margin:4px 0}.options{display:grid;gap:10px;margin-top:14px}.option{border:1px solid var(--line);background:#fff;border-radius:17px;padding:14px;text-align:left;font-weight:750}.option.correct{background:#dcfce7;border-color:#86efac;color:#166534}.option.wrong{background:#fee2e2;border-color:#fecaca;color:#991b1b}.result{margin-top:12px;min-height:28px;font-weight:800}.quiz-extra{margin-top:12px;text-align:left;background:#f9fafb;border:1px solid var(--line);border-radius:18px;padding:12px;line-height:1.55}.mode-badge{display:inline-flex;align-items:center;gap:5px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;margin-bottom:8px}.progressbar{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progressbar div{height:100%;background:linear-gradient(90deg,#60a5fa,#2563eb);width:0%;transition:.25s}
    .phrase-list{display:grid;gap:10px}.phrase{border:1px solid var(--line);border-radius:18px;background:#fff;padding:13px}.phrase b{display:block;font-size:17px}.phrase span{display:block;color:var(--muted);margin-top:4px}.phrase-row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.mini-btn{border:0;background:#eff6ff;color:#1d4ed8;border-radius:12px;padding:8px 10px;font-weight:800}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.form-grid .full{grid-column:1/-1}.danger-zone{border-top:1px solid var(--line);margin-top:14px;padding-top:14px}.notice{background:#ecfeff;border:1px solid #a5f3fc;color:#155e75;border-radius:18px;padding:12px;line-height:1.55}
    .hidden{display:none!important}.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:8px 10px calc(8px + env(safe-area-inset-bottom))}.bottom-inner{max-width:980px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.bottom-inner button{border:0;background:#f3f4f6;color:#374151;border-radius:15px;padding:8px 2px;font-size:11px}.bottom-inner button.active{background:var(--primary);color:#fff;font-weight:800}.bottom-inner .ico{display:block;font-size:20px;margin-bottom:2px}
    @media(max-width:760px){.app{padding:12px 10px 84px}.grid{grid-template-columns:1fr}.desktop-only{display:none}.tabs{display:none}.filters{grid-template-columns:1fr 1fr}.filters input{grid-column:1/-1}.stats{grid-template-columns:repeat(2,1fr)}.word{font-size:36px}.image-cue{height:130px}.actions{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.card{padding:14px;border-radius:20px}.hero{margin:-12px -10px 10px;padding:12px 10px}.list{max-height:none}.pill{display:none}}
    @media(min-width:761px){.bottom-nav{display:none}}
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="hero-row">
        <div class="brand"><div class="logo">📘</div><div><h1>英文學習 App</h1><div class="sub">生活對話・圖片記憶・真正測驗版</div></div></div>
        <div class="pill" id="todayPill">今日 0 個</div>
      </div>
      <nav class="tabs" id="tabs"></nav>
    </header>

    <main>
      <section id="view-home">
        <div class="grid">
          <div class="card">
            <div class="section-title"><h2>今日學習</h2><span class="small">建議每天 10 個單字</span></div>
            <div class="stats">
              <div class="stat"><b id="statTotal">0</b><span>總單字</span></div>
              <div class="stat"><b id="statLearned">0</b><span>已學會</span></div>
              <div class="stat"><b id="statWrong">0</b><span>錯題</span></div>
              <div class="stat"><b id="statFav">0</b><span>收藏</span></div>
            </div>
            <div style="height:14px"></div>
            <div class="progressbar"><div id="progressFill"></div></div>
            <div class="notice" style="margin-top:14px">記法：先看 emoji 圖像 → 聽發音 → 看例句 → 自己唸一次。手機版建議用 Safari / Chrome 開 GitHub Pages 網址，再加入主畫面。</div>
          </div>
          <div class="card">
            <div class="section-title"><h2>快速開始</h2></div>
            <div class="actions" style="grid-template-columns:1fr;">
              <button class="btn primary" data-go="cards">開始背單字</button>
              <button class="btn ok" data-go="quiz">開始測驗</button>
              <button class="btn warn" data-go="phrases">生活句型</button>
              <button class="btn" data-go="review">錯題複習</button>
            </div>
          </div>
        </div>
      </section>

      <section id="view-cards" class="hidden">
        <div class="grid">
          <div class="card">
            <div class="section-title"><h2>單字卡</h2><span class="small" id="cardCount"></span></div>
            <div class="filters">
              <input id="searchInput" class="field" placeholder="搜尋英文 / 中文 / 情境" />
              <select id="levelFilter" class="field"></select>
              <select id="catFilter" class="field"></select>
            </div>
            <div class="word-card" id="wordCard"></div>
          </div>
          <aside class="card desktop-only">
            <div class="section-title"><h2>單字列表</h2></div>
            <div class="list" id="wordList"></div>
          </aside>
        </div>
      </section>

      <section id="view-quiz" class="hidden">
        <div class="card quiz-box">
          <div class="section-title"><h2>圖片記憶測驗</h2><span class="small" id="quizScore">0 / 0</span></div>
          <div id="quizArea"></div>
        </div>
      </section>

      <section id="view-phrases" class="hidden">
        <div class="card">
          <div class="section-title"><h2>生活常用句型</h2><span class="small">點喇叭可播放</span></div>
          <div class="phrase-list" id="phraseList"></div>
        </div>
      </section>

      <section id="view-review" class="hidden">
        <div class="grid">
          <div class="card">
            <div class="section-title"><h2>錯題 / 收藏複習</h2><span class="small">優先補弱點</span></div>
            <div class="actions" style="grid-template-columns:1fr 1fr;margin-bottom:12px">
              <button class="btn bad" id="showWrongBtn">看錯題</button>
              <button class="btn warn" id="showFavBtn">看收藏</button>
            </div>
            <div id="reviewList" class="phrase-list"></div>
          </div>
          <div class="card">
            <div class="section-title"><h2>新增自己的單字</h2></div>
            <div class="form-grid">
              <input class="field" id="newWord" placeholder="英文，例如：receipt" />
              <input class="field" id="newMeaning" placeholder="中文，例如：收據" />
              <input class="field" id="newEmoji" placeholder="圖片提示，例如：🧾" />
              <input class="field" id="newCategory" placeholder="分類，例如：購物" />
              <textarea class="field full" id="newExample" rows="3" placeholder="例句，例如：Can I have a receipt?"></textarea>
              <button class="btn primary full" id="addWordBtn">加入單字</button>
            </div>
            <div class="danger-zone">
              <button class="btn bad" id="resetBtn">清除學習紀錄</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <nav class="bottom-nav"><div class="bottom-inner" id="bottomNav"></div></nav>

  <script>

      ['explain','解釋','🗣️','學習','A2','Can you explain this again?','說明講解。'],
      ['slowly','慢慢地','🐢','溝通','A2','Please speak slowly.','烏龜慢慢走。'],
      ['again','再一次','🔁','溝通','A1','Can you say that again?','循環箭頭想到 again。']
    ].map((x,i)=>({id:'w'+i, word:x[0], meaning:x[1], emoji:x[2], category:x[3], level:x[4], example:x[5], memory:x[6]}));

    const phrases = [
      ['Could you say that again?','你可以再說一次嗎？','聽不清楚'],
      ['Please speak slowly.','請慢慢說。','請對方放慢'],
      ['What does this mean?','這是什麼意思？','問意思'],
      ['How do I get there?','我要怎麼去那裡？','問路'],
      ['Can I have the menu, please?','可以給我菜單嗎？','點餐'],
      ['I would like this one.','我要這個。','購物 / 點餐'],
      ['Can I pay by card?','可以刷卡嗎？','付款'],
      ['Where is the bathroom?','廁所在哪裡？','生活必備'],
      ['I am still learning English.','我還在學英文。','自我介紹'],
      ['Let me think for a second.','讓我想一下。','爭取時間'],
      ['Can you give me an example?','你可以給我一個例子嗎？','學習'],
      ['I don\'t understand this part.','我不懂這一段。','學習'],
      ['I need help.','我需要幫忙。','求助'],
      ['I am not feeling well.','我身體不太舒服。','緊急'],
      ['What time does it start?','幾點開始？','時間']
    ];

    const views = [
      ['home','首頁','🏠'], ['cards','單字','📘'], ['quiz','測驗','🧠'], ['phrases','句型','💬'], ['review','複習','⭐']
    ];
    const KEY='english-learning-web-v1';
    let state = loadState();
    let currentView='home';
    let cardIndex=0;
    let quiz = {item:null, mode:null, prompt:'', options:[], correctAnswer:'', answered:false, correct:0, total:0};
    let reviewMode='wrong';

    function loadState(){
      try{
        const saved = JSON.parse(localStorage.getItem(KEY) || '{}');
        return {learned:saved.learned||{}, wrong:saved.wrong||{}, fav:saved.fav||{}, custom:saved.custom||[], today:saved.today||{date:today(),count:0}};
      }catch(e){return {learned:{}, wrong:{}, fav:{}, custom:[], today:{date:today(),count:0}}}
    }
    function saveState(){ localStorage.setItem(KEY, JSON.stringify(state)); }
    function today(){return new Date().toISOString().slice(0,10)}
    function allWords(){return [...starterWords, ...state.custom]}
    function speak(text){
      if(!('speechSynthesis' in window)){ alert('這個瀏覽器不支援發音'); return; }
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=.82; speechSynthesis.speak(u);
    }
    function setView(v){ currentView=v; document.querySelectorAll('main section').forEach(s=>s.classList.add('hidden')); document.getElementById('view-'+v).classList.remove('hidden'); renderNav(); render(); window.scrollTo({top:0,behavior:'smooth'}); }
    function renderNav(){
      const html = views.map(([id,label,ico])=>`<button class="tab ${id===currentView?'active':''}" data-view="${id}">${ico} ${label}</button>`).join('');
      document.getElementById('tabs').innerHTML=html;
      const bottom = views.map(([id,label,ico])=>`<button class="${id===currentView?'active':''}" data-view="${id}"><span class="ico">${ico}</span>${label}</button>`).join('');
      document.getElementById('bottomNav').innerHTML=bottom;
      document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>setView(b.dataset.view));
      document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>setView(b.dataset.go));
    }
    function filteredWords(){
      const q=(document.getElementById('searchInput')?.value||'').trim().toLowerCase();
      const lv=document.getElementById('levelFilter')?.value||'全部';
      const cat=document.getElementById('catFilter')?.value||'全部';
      return allWords().filter(w=>(!q||[w.word,w.meaning,w.category,w.example].join(' ').toLowerCase().includes(q))&&(lv==='全部'||w.level===lv)&&(cat==='全部'||w.category===cat));
    }
    function renderStats(){
      const words=allWords(), learned=Object.keys(state.learned).length, wrong=Object.keys(state.wrong).length, fav=Object.keys(state.fav).length;
      document.getElementById('statTotal').textContent=words.length;
      document.getElementById('statLearned').textContent=learned;
      document.getElementById('statWrong').textContent=wrong;
      document.getElementById('statFav').textContent=fav;
      document.getElementById('progressFill').style.width=Math.min(100, Math.round(learned/words.length*100))+'%';
      if(state.today.date!==today()){state.today={date:today(),count:0};saveState()}
      document.getElementById('todayPill').textContent='今日 '+state.today.count+' 個';
    }
    function renderFilters(){
      const words=allWords();
      const levels=['全部',...Array.from(new Set(words.map(w=>w.level)))];
      const cats=['全部',...Array.from(new Set(words.map(w=>w.category)))];
      const lv=document.getElementById('levelFilter'), cat=document.getElementById('catFilter');
      if(lv && !lv.dataset.ready){lv.innerHTML=levels.map(x=>`<option>${x}</option>`).join('');lv.dataset.ready=1;lv.onchange=()=>{cardIndex=0;renderCards()}}
      if(cat && !cat.dataset.ready){cat.innerHTML=cats.map(x=>`<option>${x}</option>`).join('');cat.dataset.ready=1;cat.onchange=()=>{cardIndex=0;renderCards()}}
      const search=document.getElementById('searchInput'); if(search && !search.dataset.ready){search.oninput=()=>{cardIndex=0;renderCards()};search.dataset.ready=1}
    }
    function renderCards(){
      renderFilters();
      const words=filteredWords(); if(cardIndex>=words.length)cardIndex=0;
      const w=words[cardIndex];
      document.getElementById('cardCount').textContent=words.length?`${cardIndex+1} / ${words.length}`:'0 / 0';
      if(!w){document.getElementById('wordCard').innerHTML='<div class="notice">找不到單字，換個關鍵字試試。</div>';document.getElementById('wordList').innerHTML='';return}
      const learned=!!state.learned[w.id], fav=!!state.fav[w.id], wrong=!!state.wrong[w.id];
      document.getElementById('wordCard').innerHTML=`
        <div class="image-cue">${w.emoji}</div>
        <div class="word-line"><div><div class="word">${w.word}</div><div class="phonetic">${w.level}・${w.category}</div></div><button class="star" id="favBtn">${fav?'⭐':'☆'}</button></div>
        <div class="tag-row"><span class="tag blue">${w.category}</span><span class="tag green">${learned?'已學會':'未標記'}</span>${wrong?'<span class="tag orange">錯題</span>':''}</div>
        <div class="meaning">${w.meaning}</div>
        <div class="example"><div class="en">${w.example}</div><div class="zh">${translateHint(w)}</div></div>
        <div class="memory">💡 記憶提示：${w.memory}</div>
        <div class="actions"><button class="btn primary" id="speakBtn">🔊 發音</button><button class="btn ok" id="learnedBtn">✅ 學會</button><button class="btn bad" id="wrongBtn">❌ 錯題</button><button class="btn" id="nextBtn">下一個 ➜</button></div>`;
      document.getElementById('speakBtn').onclick=()=>speak(w.word+'. '+w.example);
      document.getElementById('learnedBtn').onclick=()=>{state.learned[w.id]=Date.now();delete state.wrong[w.id];incToday();saveState();renderCards();renderStats()};
      document.getElementById('wrongBtn').onclick=()=>{state.wrong[w.id]=Date.now();saveState();renderCards();renderStats()};
      document.getElementById('favBtn').onclick=()=>{state.fav[w.id]?delete state.fav[w.id]:state.fav[w.id]=Date.now();saveState();renderCards();renderStats()};
      document.getElementById('nextBtn').onclick=()=>{cardIndex=(cardIndex+1)%words.length;renderCards()};
      document.getElementById('wordList').innerHTML=words.map((x,i)=>`<button class="word-item ${i===cardIndex?'active':''}" data-i="${i}"><div class="item-emoji">${x.emoji}</div><div class="item-main"><b>${x.word}</b><span>${x.meaning}</span></div><span>${state.fav[x.id]?'⭐':''}</span></button>`).join('');
      document.querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>{cardIndex=Number(b.dataset.i);renderCards()});
    }
    function translateHint(w){
      const map={hello:'哈囉，很高興認識你。',thanks:'謝謝你的幫忙。',sorry:'抱歉，我遲到了。'};
      return map[w.word] || '請試著先看英文，再想中文意思。';
    }
    function incToday(){if(state.today.date!==today())state.today={date:today(),count:0};state.today.count++}
    function sample(arr,n){return [...arr].sort(()=>Math.random()-.5).slice(0,n)}
    function optionValue(w, mode){
      if(mode==='image-en' || mode==='zh-en') return w.word;
      return w.meaning;
    }
    function buildQuizQuestion(){
      const words=allWords();
      const item=sample(words,1)[0];
      const modes=['image-en','en-zh','zh-en','listen-zh'];
      const mode=modes[Math.floor(Math.random()*modes.length)];
      const answer=optionValue(item, mode);
      const wrongs=sample(words.filter(w=>w.id!==item.id),3).map(w=>optionValue(w, mode));
      const modeText={
        'image-en':'看圖選英文',
        'en-zh':'看英文選中文',
        'zh-en':'看中文選英文',
        'listen-zh':'聽發音選中文'
      }[mode];
      let prompt='';
      if(mode==='image-en') prompt='只看圖片提示，選出正確英文單字。';
      if(mode==='en-zh') prompt='看英文單字，選出正確中文意思。';
      if(mode==='zh-en') prompt='看中文意思，選出正確英文單字。';
      if(mode==='listen-zh') prompt='先按發音，只靠聽力選中文意思。';
      return {item, mode, prompt, modeText, correctAnswer:answer, options:sample([answer,...wrongs],4), answered:false};
    }
    function nextQuiz(){
      const q=buildQuizQuestion();
      quiz={...quiz,...q};
      renderQuiz();
    }
    function renderQuiz(){
      if(!quiz.item) nextQuiz();
      const w=quiz.item;
      document.getElementById('quizScore').textContent=`${quiz.correct} / ${quiz.total}`;
      let main='';
      if(quiz.mode==='image-en'){
        main=`<div class="quiz-emoji">${w.emoji}</div><div class="small">分類：${w.category}</div>`;
      }else if(quiz.mode==='en-zh'){
        main=`<div class="quiz-word">${w.word}</div><div class="small">${w.level}・${w.category}</div>`;
      }else if(quiz.mode==='zh-en'){
        main=`<div class="quiz-word" style="font-size:30px">${w.meaning}</div><div class="small">選出對應的英文。</div>`;
      }else{
        main=`<div class="quiz-emoji">🔊</div><button class="btn primary" id="listenOnlyBtn" style="width:100%;max-width:260px">播放發音</button><div class="small" style="margin-top:8px">不顯示英文，先靠耳朵判斷。</div>`;
      }
      document.getElementById('quizArea').innerHTML=`
        <div class="mode-badge">🧠 ${quiz.modeText}</div>
        <div class="small" style="margin-bottom:8px">${quiz.prompt}</div>
        ${main}
        <div class="options">${quiz.options.map(o=>`<button class="option" data-opt="${escapeHtml(o)}">${o}</button>`).join('')}</div>
        <div class="result" id="quizResult"></div>
        <div id="quizExplain" class="quiz-extra hidden"></div>
        <div class="actions" style="grid-template-columns:1fr 1fr;margin-top:12px">
          <button class="btn primary" id="quizSpeak">🔊 發音</button>
          <button class="btn" id="quizNext">下一題 ➜</button>
        </div>`;
      document.querySelectorAll('[data-opt]').forEach(btn=>btn.onclick=()=>answerQuiz(btn));
      document.getElementById('quizSpeak').onclick=()=>speak(w.word+'. '+w.example);
      const listenBtn=document.getElementById('listenOnlyBtn'); if(listenBtn)listenBtn.onclick=()=>speak(w.word);
      document.getElementById('quizNext').onclick=nextQuiz;
      if(quiz.mode==='listen-zh') setTimeout(()=>speak(w.word),300);
    }
    function answerQuiz(btn){
      if(quiz.answered)return; quiz.answered=true; quiz.total++;
      const ans=btn.dataset.opt, correct=quiz.correctAnswer;
      document.querySelectorAll('[data-opt]').forEach(b=>{ if(b.dataset.opt===correct)b.classList.add('correct'); if(b===btn && ans!==correct)b.classList.add('wrong'); });
      const explain=document.getElementById('quizExplain');
      explain.classList.remove('hidden');
      explain.innerHTML=`<b>${quiz.item.emoji} ${quiz.item.word}</b> = ${quiz.item.meaning}<br><span class="small">例句：${quiz.item.example}</span><br><span class="small">記憶提示：${quiz.item.memory}</span>`;
      if(ans===correct){quiz.correct++; state.learned[quiz.item.id]=Date.now(); delete state.wrong[quiz.item.id]; document.getElementById('quizResult').textContent='答對了 ✅';}
      else{state.wrong[quiz.item.id]=Date.now(); document.getElementById('quizResult').textContent='答錯了，正解：'+correct;}
      incToday(); saveState(); renderStats(); document.getElementById('quizScore').textContent=`${quiz.correct} / ${quiz.total}`;
    }
    function renderPhrases(){
      document.getElementById('phraseList').innerHTML=phrases.map(p=>`<div class="phrase"><div class="phrase-row"><div><b>${p[0]}</b><span>${p[1]}</span><span class="tag blue" style="display:inline-flex;margin-top:8px">${p[2]}</span></div><button class="mini-btn" data-say="${escapeHtml(p[0])}">🔊</button></div></div>`).join('');
      document.querySelectorAll('[data-say]').forEach(b=>b.onclick=()=>speak(b.dataset.say));
    }
    function renderReview(){
      const ids=Object.keys(reviewMode==='wrong'?state.wrong:state.fav); const words=allWords().filter(w=>ids.includes(w.id));
      document.getElementById('reviewList').innerHTML=words.length?words.map(w=>`<div class="phrase"><div class="phrase-row"><div><b>${w.emoji} ${w.word}</b><span>${w.meaning}</span><span>${w.example}</span></div><button class="mini-btn" data-say="${w.word}">🔊</button></div></div>`).join(''):'<div class="notice">目前沒有資料。答錯的題目或收藏單字會出現在這裡。</div>';
      document.querySelectorAll('[data-say]').forEach(b=>b.onclick=()=>speak(b.dataset.say));
      document.getElementById('showWrongBtn').onclick=()=>{reviewMode='wrong';renderReview()};
      document.getElementById('showFavBtn').onclick=()=>{reviewMode='fav';renderReview()};
      document.getElementById('addWordBtn').onclick=addWord;
      document.getElementById('resetBtn').onclick=()=>{if(confirm('確定清除學習紀錄？自訂單字會保留。')){state.learned={};state.wrong={};state.fav={};state.today={date:today(),count:0};saveState();render()}};
    }
    function addWord(){
      const word=document.getElementById('newWord').value.trim(); const meaning=document.getElementById('newMeaning').value.trim();
      if(!word||!meaning){alert('英文和中文意思必填');return}
      const emoji=document.getElementById('newEmoji').value.trim()||'📝'; const category=document.getElementById('newCategory').value.trim()||'自訂'; const example=document.getElementById('newExample').value.trim()||`I want to learn the word ${word}.`;
      state.custom.push({id:'c'+Date.now(),word,meaning,emoji,category,level:'自訂',example,memory:`把 ${emoji} 跟 ${word} 連在一起記。`}); saveState(); alert('已加入單字'); ['newWord','newMeaning','newEmoji','newCategory','newExample'].forEach(id=>document.getElementById(id).value=''); render();
    }
    function escapeHtml(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
    function render(){ renderStats(); if(currentView==='cards')renderCards(); if(currentView==='quiz')renderQuiz(); if(currentView==='phrases')renderPhrases(); if(currentView==='review')renderReview(); }
    renderNav(); render();
    if('serviceWorker' in navigator && location.protocol.startsWith('http')){navigator.serviceWorker.register('./service-worker.js').catch(()=>{});}
  </script>
</body>
</html>
